<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Workaround for sandboxed environments where window.fetch is a read-only getter.
      // Making it writable prevents transitive polyfills (like formdata-polyfill) from crashing on boot.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true
            });
          }
        } catch (e) {
          console.warn("Could not make window.fetch writable:", e);
        }
      })();
    </script>
    <title>Aarasta Studio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
